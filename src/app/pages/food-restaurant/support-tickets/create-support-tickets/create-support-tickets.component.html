<div class="row">
    <div class="col-xl-8">
      <div class="card">
        <div class="card-header">
          <div>
            <h4 class="card-title">
              <i class="bi bi-arrow-left-short" routerLink="/gym/support-tickets"></i>
              <span>Create Support Ticket </span>
            </h4>
          </div>
        </div>
        <div class="card-body">
          <div class="card-form">
            <form [formGroup]="supportForm">
            <div class="row">
               

  
  
                <div class="col-lg-12 mb-2">
                  <div class="custom-form-input custom-textarea mb-2">
                    <label class="label-form">Description</label>
                    <mat-form-field appearance="outline" class="w-100">
                      <textarea matInput rows="6" formControlName="query"></textarea>
                    </mat-form-field>
                    <mat-error
                    class="text-danger"
                    *ngIf="submitted && f['query'].errors"
                  >
                    <span *ngIf="f['query'].errors['required']"
                      >*Description is required
                    </span>
                  </mat-error>
                  
                  </div>
                </div>
  
              
  
                <div class="col-lg-6">
                  <button class="w-100" color="primary" mat-flat-button (click)="Addissue()">
                   Save 
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
